version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 8
      nodejs: 20

  pre_build:
    commands:
      - echo "Restoring .NET dependencies..."
      - dotnet restore backend/JobIntelligence.sln
      - echo "Installing Angular dependencies..."
      - cd frontend && npm ci && cd ..

  build:
    commands:
      - echo "Publishing .NET API..."
      - dotnet publish backend/JobIntelligence.API/JobIntelligence.API.csproj --configuration Release --output publish/api --no-restore
      - echo "Building Angular frontend..."
      - cd frontend && npm run build -- --configuration production && cd ..

  post_build:
    commands:
      - echo "Packaging for Elastic Beanstalk..."
      - cp -r frontend/dist/. publish/api/wwwroot/ 2>/dev/null || true
      - cd publish/api && zip -r ../../deploy.zip . && cd ../..
      - echo "Build complete. Artifact deploy.zip"

artifacts:
  files:
    - deploy.zip
  discard-paths: yes

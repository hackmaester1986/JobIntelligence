version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 8.0
      nodejs: 20
    commands:
      - echo Installing frontend dependencies...
      - cd frontend && npm ci && cd ..

  pre_build:
    commands:
      - echo Restoring .NET dependencies...
      - dotnet restore backend/JobIntelligence.sln

  build:
    commands:
      - echo Building Angular frontend...
      - cd frontend && npm run build -- --configuration production && cd ..

      - echo Publishing .NET API...
      - dotnet publish backend/JobIntelligence.API/JobIntelligence.API.csproj --configuration Release --output publish

      - echo Copying Angular output into wwwroot...
      - mkdir -p publish/wwwroot
      - cp -r frontend/dist/. publish/wwwroot/

      - echo Creating Procfile...
      - cp backend/JobIntelligence.API/Procfile publish/Procfile

  post_build:
    commands:
      - echo Build complete
      - find publish -maxdepth 3 -type f | sort | head -100

artifacts:
  base-directory: publish
  files:
    - '**/*'

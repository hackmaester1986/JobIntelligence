version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 8.0
      nodejs: 20
    commands:
      - echo Installing frontend dependencies...
      - cd frontend && npm ci && cd ..

  pre_build:
    commands:
      - echo Restoring .NET dependencies...
      - dotnet restore backend/JobIntelligence.sln

  build:
    commands:
      - echo Building Angular frontend...
      - cd frontend && npm run build -- --configuration production && cd ..

      - echo Publishing .NET API...
      - dotnet publish backend/JobIntelligence.API/JobIntelligence.API.csproj --configuration Release --output publish

      - echo Copying Angular output into wwwroot...
      - mkdir -p publish/wwwroot
      - cp -r frontend/dist/frontend/browser/. publish/wwwroot/

      - echo Creating Procfile...
      - cp backend/JobIntelligence.API/Procfile publish/Procfile

      - echo Copying nginx config...
      - mkdir -p publish/.platform/nginx/conf.d
      - cp .platform/nginx/conf.d/timeout.conf publish/.platform/nginx/conf.d/timeout.conf

  post_build:
    commands:
      - echo Build complete
      - find publish -maxdepth 3 -type f | sort | head -100

      - echo Building and pushing worker Docker image to ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
      - docker build -f backend/Dockerfile.worker -t $ECR_REGISTRY/jobintelligence-worker:latest -t $ECR_REGISTRY/jobintelligence-worker:$CODEBUILD_RESOLVED_SOURCE_VERSION backend/
      - docker push $ECR_REGISTRY/jobintelligence-worker:latest
      - docker push $ECR_REGISTRY/jobintelligence-worker:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - echo Worker image pushed successfully

artifacts:
  base-directory: publish
  files:
    - '**/*'

<div class="search-bar">
  <mat-form-field appearance="outline" style="flex: 2">
    <mat-label>Job title</mat-label>
    <input matInput [(ngModel)]="titleQ" (ngModelChange)="onSearchInput()" placeholder="Search by job title…">
  </mat-form-field>
  <mat-form-field appearance="outline" style="flex: 1">
    <mat-label>Skill</mat-label>
    <input matInput [(ngModel)]="skillQ" (ngModelChange)="onSearchInput()" placeholder="e.g. Python, React…">
  </mat-form-field>
</div>

<div class="layout">
  <div class="main-content">
    <p class="total" *ngIf="result() as r">{{ r.total | number }} jobs found</p>

    <div *ngIf="loading()" style="display: flex; justify-content: center; padding: 48px">
      <mat-spinner></mat-spinner>
    </div>

    <div class="jobs-grid" *ngIf="!loading() && result() as r">
      <mat-card class="job-card" *ngFor="let job of r.data">
        <mat-card-content>
          <h3>{{ job.title }}</h3>
          <p class="company">{{ job.company?.canonicalName }}</p>
          <p class="meta">
            {{ job.locationRaw }}
            <ng-container *ngIf="job.seniorityLevel"> · {{ job.seniorityLevel }}</ng-container>
            <ng-container *ngIf="job.company?.industry"> · {{ job.company?.industry }}</ng-container>
          </p>
          <div class="card-footer">
            <div class="footer-left">
              <p class="meta" style="margin:0">{{ timeAgo(job.firstSeenAt) }}</p>
              <div class="chips">
                <span *ngIf="job.isRemote" class="chip remote">Remote</span>
                <span *ngIf="job.isHybrid" class="chip hybrid">Hybrid</span>
                <span *ngIf="!job.isRemote && job.isRemoteInDescription" class="chip possibly-remote">Possibly Remote</span>
                <span *ngIf="job.source?.name" class="chip source">{{ job.source?.name }}</span>
              </div>
            </div>
            <a *ngIf="job.applyUrl" mat-flat-button color="primary" class="apply-btn" [href]="job.applyUrl" target="_blank" rel="noopener noreferrer" (click)="$event.stopPropagation()">Apply</a>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

    <mat-paginator
      *ngIf="result() as r"
      [length]="r.total"
      [pageSize]="filters.pageSize ?? 20"
      [pageIndex]="(filters.page ?? 1) - 1"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)">
    </mat-paginator>
  </div>
</div>

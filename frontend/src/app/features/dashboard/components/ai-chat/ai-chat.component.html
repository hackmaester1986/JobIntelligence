<div class="chat-container">
  <div class="messages" #messagesContainer>
    <div *ngIf="messages().length === 0" class="empty-state">
      Ask me about job trends, top companies, seniority breakdown, or any job market insights!
    </div>
    <div *ngFor="let msg of messages()"
         class="message"
         [ngClass]="msg.role === 'user' ? 'user' : 'assistant'">
      <div class="bubble">{{ msg.content }}</div>
    </div>
    <div *ngIf="loading()" class="message assistant">
      <div class="bubble thinking">
        <mat-spinner diameter="20"></mat-spinner>
        <span>Thinking...</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <mat-form-field appearance="outline" class="input-field">
      <textarea matInput
                cdkTextareaAutosize
                cdkAutosizeMinRows="3"
                cdkAutosizeMaxRows="6"
                placeholder="Ask about job trends, top companies, seniority..."
                [value]="inputText()"
                (input)="inputText.set($any($event.target).value)"
                (keydown)="onKeyDown($event)"
                [disabled]="loading()"></textarea>
    </mat-form-field>
    <button mat-raised-button color="primary" class="send-button"
            (click)="send()"
            [disabled]="!inputText().trim() || loading()">
      Send
    </button>
  </div>
</div>
